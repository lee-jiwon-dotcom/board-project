services:
  # PHP-FPM 컨테이너
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: board-app
    volumes:
      - .:/var/www/html
    depends_on:
      - mysql
    networks:
      - board-network

  # Nginx 웹서버
  nginx:
    image: nginx:alpine
    container_name: board-nginx
    ports:
      - "8090:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - board-network

  # MySQL 데이터베이스
  mysql:
    image: mysql:8.0
    container_name: board-mysql
    ports:
      - "33067:3306"
    environment:
      MYSQL_DATABASE: board_db
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: laravel
      MYSQL_PASSWORD: laravel
    volumes:
      - board-mysql-data:/var/lib/mysql
    networks:
      - board-network

# 컨테이너끼리 통신할 네트워크
networks:
  board-network:
    driver: bridge

# MySQL 데이터 영구 저장용 볼륨
volumes:
  board-mysql-data: